<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - FreeUp Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --navy: #0A192F; 
            --navy-light: #112240;
            --teal: #10B981; 
            --teal-dark: #059669; 
            --teal-light: rgba(16, 185, 129, 0.1); 
            --gold: #D4AF37;
            --white: #ffffff; 
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--navy); 
            color: var(--text-main); 
            padding: 40px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
        }

        h1 { font-family: 'Montserrat', sans-serif; color: #fff; font-size: 24px; }
        .logo span { color: var(--teal); }

        /* TABS */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 30px; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .tab { 
            padding: 12px 24px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 700; 
            transition: 0.3s;
            color: var(--text-muted);
        }
        .tab.active { 
            background: var(--teal-light); 
            color: var(--teal); 
        }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.05); }

        /* CONTENT */
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { 
            background: var(--navy-light); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .table-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
        }
        th { text-align: left; padding: 15px; color: var(--teal); border-bottom: 1px solid var(--border); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); color: var(--text-main); font-size: 15px; }
        
        .btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--teal); color: #000; }
        .btn-primary:hover { background: var(--teal-dark); color: #fff; }
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: #F43F5E; }
        .btn-danger:hover { background: #F43F5E; color: #fff; }

        .badge { 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
        }
        .badge-pending { background: rgba(255, 193, 7, 0.1); color: #FFC107; }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: #10B981; }

        /* MODAL */
        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; align-items: center; justify-content: center; z-index: 100; 
        }
        .modal { 
            background: var(--navy-light); width: 100%; max-width: 500px; 
            border-radius: 20px; padding: 30px; border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: #fff; outline: none; font-family: inherit;
        }
        input:focus { border-color: var(--teal); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">Free<span>Up</span> CRM Admin</h1>
        <div id="status-bar" style="font-size: 13px; color: var(--text-muted);">Hệ thống đang trực tuyến</div>
    </header>

    <div class="tabs">
        <div class="tab active" data-tab="products" onclick="switchTab('products')">Sản phẩm</div>
        <div class="tab" data-tab="customers" onclick="switchTab('customers')">Khách hàng</div>
        <div class="tab" data-tab="orders" onclick="switchTab('orders')">Đơn hàng</div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div id="products" class="content-section active">
        <div class="glass-card">
            <div class="table-header">
                <h2>Danh sách Sản phẩm</h2>
                <button class="btn btn-primary" onclick="openModal('products')"><i data-lucide="plus"></i> Thêm sản phẩm</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- CUSTOMERS SECTION -->
    <div id="customers" class="content-section">
        <div class="glass-card">
            <div class="table-header">
                <h2>Danh sách Khách hàng</h2>
                <button class="btn btn-primary" onclick="openModal('customers')"><i data-lucide="plus"></i> Thêm khách hàng</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên khách hàng</th>
                        <th>SĐT</th>
                        <th>Zalo</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="customers-table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- ORDERS SECTION -->
    <div id="orders" class="content-section">
        <div class="glass-card">
            <div class="table-header">
                <h2>Quản lý Đơn hàng</h2>
                <button class="btn btn-primary" onclick="openModal('orders')"><i data-lucide="plus"></i> Tạo đơn hàng</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Khách hàng</th>
                        <th>Sản phẩm</th>
                        <th>Số tiền</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title" style="margin-bottom: 25px;">Thêm mới</h3>
        <form id="admin-form">
            <div id="form-fields"></div>
            <div style="display: flex; gap: 10px; margin-top: 30px; justify-content: flex-end;">
                <button type="button" class="btn" style="background: rgba(255,255,255,0.1);" onclick="closeModal()">Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu lại</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentTab = 'products';
    const API_BASE = '/.netlify/functions/admin';

    async function loadData(tab) {
        try {
            const res = await fetch(`${API_BASE}/${tab}`, {
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await res.json();
            const tbody = document.getElementById(`${tab}-table-body`);
            tbody.innerHTML = '';

            data.forEach(item => {
                const tr = document.createElement('tr');
                if (tab === 'products') {
                    tr.innerHTML = `
                        <td>#${item.id}</td>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.price.toLocaleString()}đ</td>
                        <td>${item.stock_quantity}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteItem('products', ${item.id})"><i data-lucide="trash-2"></i></button></td>
                    `;
                } else if (tab === 'customers') {
                    tr.innerHTML = `
                        <td>#${item.id}</td>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.phone}</td>
                        <td>${item.zalo}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteItem('customers', ${item.id})"><i data-lucide="trash-2"></i></button></td>
                    `;
                } else if (tab === 'orders') {
                    const badgeClass = item.status === 'success' ? 'badge-success' : 'badge-pending';
                    tr.innerHTML = `
                        <td>#${item.id}</td>
                        <td>${item.customer_name}</td>
                        <td>${item.product_name}</td>
                        <td>${item.amount.toLocaleString()}đ</td>
                        <td><span class="badge ${badgeClass}">${item.status}</span></td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteItem('orders', ${item.id})"><i data-lucide="trash-2"></i></button></td>
                    `;
                }
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        } catch (err) {
            console.error('Fetch error:', err);
            document.getElementById('status-bar').innerHTML = `<span style="color: #ff4d4d;">LỖI KẾT NỐI: Hãy chạy 'npm run chat' trước khi sử dụng.</span>`;
            alert('Không thể kết nối tới Server. Đảm bảo bạn đang chạy server local.');
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.content-section').forEach(s => s.classList.toggle('active', s.id === tab));
        loadData(tab);
    }

    async function deleteItem(resource, id) {
        if (!confirm('Bạn có chắc muốn xóa không?')) return;
        await fetch(`${API_BASE}/${resource}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        loadData(currentTab);
    }

    function openModal(tab) {
        const fields = document.getElementById('form-fields');
        fields.innerHTML = '';
        document.getElementById('modal-title').innerText = `Thêm ${tab === 'products' ? 'Sản phẩm' : tab === 'customers' ? 'Khách hàng' : 'Đơn hàng'}`;

        if (tab === 'products') {
            fields.innerHTML = `
                <div class="form-group"><label>Tên sản phẩm</label><input name="name" required></div>
                <div class="form-group"><label>Giá (VNĐ)</label><input type="number" name="price" required></div>
                <div class="form-group"><label>Mô tả</label><textarea name="description"></textarea></div>
                <div class="form-group"><label>Số lượng kho</label><input type="number" name="stock_quantity" required></div>
            `;
        } else if (tab === 'customers') {
            fields.innerHTML = `
                <div class="form-group"><label>Họ tên</label><input name="name" required></div>
                <div class="form-group"><label>Số điện thoại</label><input name="phone" required></div>
                <div class="form-group"><label>Zalo</label><input name="zalo"></div>
            `;
        } else if (tab === 'orders') {
            // Need to fetch customers and products first for select
            setupOrderForm();
        }

        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function setupOrderForm() {
        const fields = document.getElementById('form-fields');
        const [cRes, pRes] = await Promise.all([
            fetch(`${API_BASE}/customers`, { headers: { 'Content-Type': 'application/json' } }), 
            fetch(`${API_BASE}/products`, { headers: { 'Content-Type': 'application/json' } })
        ]);
        const customers = await cRes.json();
        const products = await pRes.json();

        fields.innerHTML = `
            <div class="form-group">
                <label>Khách hàng</label>
                <select name="customer_id" required>
                    ${customers.map(c => `<option value="${c.id}">${c.name} (${c.phone})</option>`).join('')}
                </select>
            </div>
            <div class="form-group">
                <label>Sản phẩm</label>
                <select name="product_id" required onchange="updateAmount(this)">
                    <option value="">-- Chọn sản phẩm --</option>
                    ${products.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} (${p.price}đ)</option>`).join('')}
                </select>
            </div>
            <div class="form-group"><label>Số tiền</label><input type="number" name="amount" id="order-amount" required></div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status">
                    <option value="pending">Chờ thanh toán</option>
                    <option value="success">Thành công</option>
                </select>
            </div>
        `;
    }

    function updateAmount(select) {
        const option = select.options[select.selectedIndex];
        if (option.dataset.price) {
            document.getElementById('order-amount').value = option.dataset.price;
        }
    }

    document.getElementById('admin-form').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        const res = await fetch(`${API_BASE}/${currentTab}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            alert('Lưu thành công!');
            closeModal();
            loadData(currentTab);
            if (currentTab === 'orders') loadData('products'); // Refresh stock
        } else {
            const err = await res.json();
            alert('Lỗi: ' + (err.error || 'Không rõ nguyên nhân'));
        }
    };

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // Initial load
    window.onload = () => {
        loadData('products');
        lucide.createIcons();
    };
</script>
</body>
</html>
